<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPL | Jail Premier League 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F4F7F9]">

    <header class="bg-[#1A202C] text-white py-6 shadow-md">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase">JPL <span class="text-red-500">2026</span></h1>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Jail Premier League • Live Updates</p>
            </div>
            <button id="langToggle" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded text-xs font-bold transition-all">
                <span id="langLabel">नेपाली</span>
            </button>
        </div>
    </header>

    <section class="bg-white border-b border-slate-200 py-8">
        <div class="container mx-auto px-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="stats-card border-l-4 border-red-600">
                    <p class="label">CPN-UML</p>
                    <h2 id="umlScore" class="value text-red-600">0</h2>
                </div>
                <div class="stats-card border-l-4 border-green-600">
                    <p class="label">Congress</p>
                    <h2 id="ncScore" class="value text-green-600">0</h2>
                </div>
                <div class="stats-card border-l-4 border-orange-500">
                    <p class="label">Others</p>
                    <h2 id="otherScore" class="value text-orange-500">0</h2>
                </div>
                <div class="stats-card border-l-4 border-slate-800 bg-slate-50">
                    <p class="label">Total Detained</p>
                    <h2 id="totalScore" class="value text-slate-800">0</h2>
                </div>
            </div>
        </div>
    </section>

    <div class="container mx-auto px-6 py-8">
        <div class="flex items-center gap-2 overflow-x-auto pb-4">
            <button onclick="filterTeam('all', this)" class="filter-tab active">All Leaders</button>
            <button onclick="filterTeam('CPN-UML', this)" class="filter-tab">CPN-UML</button>
            <button onclick="filterTeam('Nepali Congress', this)" class="filter-tab">Nepali Congress</button>
        </div>

        <div id="arrestGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <div id="google_translate_element"></div>
    <script src="script.js"></script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
